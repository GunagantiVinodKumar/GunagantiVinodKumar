name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: lowlighter/metrics@latest
        with:
          user: GunagantiVinodKumar
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Calcutta
          token: ${{ secrets.METRICS_TOKEN }}